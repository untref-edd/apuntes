<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640">
  <rect width="800" height="640" fill="#1e1e1e" />

  <defs>
    <marker id="arrowhead-dark" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#e0e0e0" />
    </marker>
  </defs>

  <style>
    .label { font-family: Arial; font-size: 14px; text-anchor: middle; dominant-baseline: middle; fill: #e0e0e0; }
    .label-small { font-family: Arial; font-size: 12px; text-anchor: middle; fill: #bbbbbb; }
    .title { font-family: Arial; font-size: 18px; text-anchor: middle; fill: #e0e0e0; font-weight: bold; }
    .edge { fill: none; stroke: #e0e0e0; stroke-width: 2; marker-end: url(#arrowhead-dark); }
    .edge-dashed { fill: none; stroke: #e0e0e0; stroke-width: 2; stroke-dasharray: 5,5; marker-end: url(#arrowhead-dark); }
    .group-box-blue { fill: #2d3748; stroke: #4682b4; stroke-width: 1; stroke-dasharray: 5,5; }
    .group-box-green { fill: #2d3748; stroke: #2e8b57; stroke-width: 1; stroke-dasharray: 5,5; }
    .box-blue { fill: #2d3748; stroke: #4682b4; stroke-width: 2; }
    .box-green { fill: #2d3748; stroke: #2e8b57; stroke-width: 2; }
    .box-yellow { fill: #2d3748; stroke: #f6ad55; stroke-width: 2; }
  </style>

  <text x="400" y="30" class="title">Diagrama de un Sistema de Recuperación de Información</text>

  <g>
    <rect x="20" y="60" width="760" height="110" rx="10" class="group-box-blue" />
    <text x="400" y="80" class="label-small" font-weight="bold">Procesamiento de documentos</text>

    <rect x="40" y="100" width="200" height="50" rx="5" class="box-blue" />
    <text x="140" y="125" class="label">Colección de documentos</text>

    <path d="M 240,125 H 280" class="edge" />

    <rect x="280" y="100" width="160" height="50" rx="5" class="box-blue" />
    <text x="360" y="125" class="label">Preprocesamiento</text>

    <path d="M 440,125 H 480" class="edge" />

    <rect x="480" y="100" width="120" height="50" rx="5" class="box-blue" />
    <text x="540" y="125" class="label">Indexación</text>

    <path d="M 600,125 H 640" class="edge" />

    <rect x="640" y="100" width="100" height="50" rx="5" class="box-blue" />
    <text x="690" y="125" class="label">Índice</text>
  </g>

  <g>
    <rect x="380" y="200" width="240" height="420" rx="10" class="group-box-green" />
    <text x="497.5" y="220" class="label-small" font-weight="bold">Procesamiento de consultas</text>

    <rect x="410" y="240" width="180" height="50" rx="5" class="box-green" />
    <text x="500" y="265" class="label">Motor de búsqueda</text>

    <path d="M 500,300 V 340" class="edge-dashed" />

    <rect x="410" y="340" width="180" height="50" rx="5" class="box-green" />
    <text x="500" y="365" class="label">Ranking y relevancia</text>

    <path d="M 500,390 V 430" class="edge" />

    <rect x="410" y="430" width="180" height="50" rx="5" class="box-green" />
    <text x="500" y="455" class="label">Resultados</text>

    <rect x="400" y="550" width="200" height="50" rx="5" class="box-green" />
    <text x="500" y="575" class="label">Procesamiento de consulta</text>
  </g>

  <g>
    <rect x="80" y="350" width="140" height="50" rx="5" class="box-yellow" />
    <text x="150" y="375" class="label">Usuario</text>

    <rect x="30" y="480" width="120" height="50" rx="5" class="box-yellow" />
    <text x="90" y="505" class="label">Consulta</text>

    <rect x="170" y="480" width="120" height="50" rx="5" class="box-yellow" />
    <text x="230" y="505" class="label">Feedback</text>
  </g>

  <g>
    <path d="M 690,150 V 255 H 590" class="edge" />

    <path d="M 120,400 V 480" class="edge" />
    <rect x="110" y="430" width="50" height="20" fill="#1e1e1e" />
    <text x="120" y="445" class="label-small">realiza</text>

    <path d="M 180,400 V 480" class="edge" />
    <rect x="160" y="430" width="30" height="20" fill="#1e1e1e" />
    <text x="180" y="445" class="label-small">da</text>

    <path d="M 90,530 V 585 H 400" class="edge-dashed" />
    <path d="M 230,530 V 565 H 400" class="edge-dashed" />

    <path d="M 600,575 H 690 V 275 H 590" class="edge" />

    <path d="M 410,455 H 250 V 375 H 220" class="edge" />
    <rect x="290" y="442.5" width="70" height="20" fill="#1e1e1e" />
    <text x="325" y="457.5" class="label-small">muestra a</text>
  </g>

</svg>
