<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">

  <defs>
    <style>
      .title { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 20px; text-anchor: middle; fill: #333333; }
      .code { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 16px; fill: #333333; text-anchor: middle; }
      .code-example { font-family: menlo, consola, 'DejaVu Sans Mono'; font-size: 18px; fill: #333333; text-anchor: start; }
      .variable-node { fill: #e1f5ff; stroke: #4682b4; stroke-width: 2; }
      .value-node { fill: #ffe1e1; stroke: #e9967a; stroke-width: 2; }
      .arrow { stroke: #333333; stroke-width: 2; marker-end: url(#arrowhead); }
      .note { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; fill: #666666; text-anchor: middle; font-style: italic; }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#333333" />
    </marker>
  </defs>

  <rect width="800" height="300" fill="#f0f2f5" />

  <text x="400" y="40" class="title">Mutabilidad (Listas)</text>

  <g transform="translate(30, 100)">
    <text x="100" y="-20" class="code-example">lista1 = [1, 2, 3]</text>
    <text x="100" y="5" class="code-example">lista2 = lista1</text>

    <rect x="20" y="30" width="80" height="40" rx="5" class="variable-node" />
    <text x="60" y="55" class="code">lista1</text>

    <rect x="20" y="90" width="80" height="40" rx="5" class="variable-node" />
    <text x="60" y="115" class="code">lista2</text>

    <path d="M 110 50 L 190 80" class="arrow" />
    <path d="M 110 110 L 190 80" class="arrow" />

    <rect x="200" y="60" width="120" height="40" rx="5" class="value-node" />
    <text x="260" y="85" class="code">[1, 2, 3]</text>
  </g>

  <g transform="translate(400, 100)">
    <text x="100" y="-20" class="code-example">lista1.append(4)</text>

    <rect x="20" y="30" width="80" height="40" rx="5" class="variable-node" />
    <text x="60" y="55" class="code">lista1</text>

    <rect x="20" y="90" width="80" height="40" rx="5" class="variable-node" />
    <text x="60" y="115" class="code">lista2</text>

    <path d="M 110 50 L 190 80" class="arrow" />
    <path d="M 110 110 L 190 80" class="arrow" />

    <rect x="200" y="60" width="150" height="40" rx="5" class="value-node" />
    <text x="275" y="85" class="code">[1, 2, 3, 4]</text>

    <text x="275" y="130" class="note">El objeto cambió "in-place"</text>
  </g>
</svg>
