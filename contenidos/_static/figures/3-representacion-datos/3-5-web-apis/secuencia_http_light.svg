<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 230">

  <defs>
    <style>
      .node { rx: 5; stroke-width: 2; }
      .node-client { fill: #e1f5ff; stroke: #4682b4; }
      .node-server { fill: #ffe1e1; stroke: #e9967a; }
      .node-box { fill: #fff9c4; stroke: #d4a017; stroke-width: 1; }
      .text { font-family: Arial; font-size: 14px; fill: #333333; text-anchor: middle; }
      .text-small { font-family: Arial; font-size: 12px; fill: #333333; text-anchor: middle; }
      .text-small-command { font-family: monospace; font-size: 12px; fill: #333333; text-anchor: middle; }
      .timeline { stroke: #333333; stroke-width: 2; stroke-dasharray: 5,5; }
      .arrow { stroke: #333333; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#333333" />
    </marker>
  </defs>

  <line class="timeline" x1="100" y1="50" x2="100" y2="220" />
  <line class="timeline" x1="400" y1="50" x2="400" y2="220" />

  <rect class="node node-client" x="50" y="10" width="100" height="40" />
  <text class="text" x="100" y="35">Cliente</text>

  <rect class="node node-server" x="350" y="10" width="100" height="40" />
  <text class="text" x="400" y="35">Servidor</text>

  <line class="arrow" x1="100" y1="80" x2="400" y2="80" />
  <text class="text-small-command" x="250" y="70">GET /index.html HTTP/1.1</text>

  <rect class="node-box" x="150" y="90" width="200" height="30" />
  <text class="text-small" x="250" y="110">Solicitud HTTP</text>

  <line class="arrow" x1="400" y1="160" x2="100" y2="160" />
  <text class="text-small-command" x="250" y="150">HTTP/1.1 200 OK</text>

  <rect class="node-box" x="150" y="170" width="200" height="30" />
  <text class="text-small" x="250" y="190">Respuesta HTTP con contenido</text>
</svg>
