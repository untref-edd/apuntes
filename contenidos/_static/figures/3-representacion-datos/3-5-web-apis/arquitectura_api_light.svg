<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 370">

  <defs>
    <style>
      .node { rx: 5; stroke-width: 2; }
      .node-blue { fill: #e1f5ff; stroke: #4682b4; }
      .node-red { fill: #ffe1e1; stroke: #e9967a; }
      .node-orange { fill: #fff4e1; stroke: #f6ad55; }
      .node-green { fill: #e1ffe1; stroke: #48bb78; }
      .node-purple { fill: #f5e1ff; stroke: #9f7aea; }
      .text { font-family: Arial; font-size: 14px; fill: #333333; text-anchor: middle; }
      .arrow { stroke: #333333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#333333" />
    </marker>
  </defs>

  <rect class="node node-blue" x="200" y="20" width="200" height="50" />
  <text class="text" x="300" y="50">Aplicación Cliente</text>

  <rect class="node node-red" x="200" y="150" width="200" height="50" />
  <text class="text" x="300" y="180">API REST</text>

  <rect class="node node-orange" x="50" y="300" width="140" height="50" />
  <text class="text" x="120" y="330">Base de Datos</text>

  <rect class="node node-green" x="230" y="300" width="140" height="50" />
  <text class="text" x="300" y="330">Servicios Externos</text>

  <rect class="node node-purple" x="410" y="300" width="140" height="50" />
  <text class="text" x="480" y="330">Lógica de Negocio</text>

  <path class="arrow" d="M 250 70 L 250 150" />
  <text class="text" x="190" y="115" text-anchor="end">Solicitud HTTP</text>

  <path class="arrow" d="M 350 150 L 350 70" />
  <text class="text" x="400" y="115" text-anchor="start">JSON/XML</text>

  <path class="arrow" d="M 250 200 L 120 300" />

  <path class="arrow" d="M 300 200 L 300 300" />

  <path class="arrow" d="M 350 200 L 480 300" />

</svg>
