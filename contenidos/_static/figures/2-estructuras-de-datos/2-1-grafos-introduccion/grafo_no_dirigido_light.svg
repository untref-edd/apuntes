<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      .edge { stroke: #333333; stroke-width: 2; }
      .weight-text { fill: #333333; font-weight: bold; font-family: Arial; font-size: 14px; }
      .node-text { fill: #333333; font-family: Arial; font-size: 14px; }
      .variable-node { fill: #e1f5ff; stroke: #4682b4; stroke-width: 2; }
      .value-node { fill: #ffe1e1; stroke: #e9967a; stroke-width: 2; }
      .highlight-edge { stroke: #ef6c00; stroke-width: 2; }
      .highlight-text { fill: #ef6c00; font-weight: bold; font-family: Arial; font-size: 14px; }
      .background { fill: #ffffff; }
    </style>
  </defs>
  <line class="edge" x1="200" y1="50" x2="100" y2="120" />
  <text class="node-text" x="140" y="80">4</text>

  
  <line class="edge" x1="200" y1="50" x2="300" y2="120" />
  <text class="node-text" x="260" y="80">5</text>

  
  <line class="edge" x1="200" y1="50" x2="270" y2="220" />
  <text class="node-text" x="220" y="150">1</text>

  
  <line class="edge" x1="100" y1="120" x2="300" y2="120" />
  <text class="node-text" x="200" y="115">2</text>

  
  <line class="edge" x1="300" y1="120" x2="130" y2="220" />
  <text class="node-text" x="230" y="180">4</text>

  
  <line class="edge" x1="130" y1="220" x2="270" y2="220" />
  <text class="node-text" x="200" y="235">3</text>

  
  <circle class="variable-node" cx="200" cy="50" r="20" />
  <text class="node-text" x="200" y="55" text-anchor="middle">A</text>

  <circle class="variable-node" cx="100" cy="120" r="20" />
  <text class="node-text" x="100" y="125" text-anchor="middle">B</text>

  <circle class="variable-node" cx="300" cy="120" r="20" />
  <text class="node-text" x="300" y="125" text-anchor="middle">C</text>

  <circle class="variable-node" cx="130" cy="220" r="20" />
  <text class="node-text" x="130" y="225" text-anchor="middle">D</text>

  <circle class="variable-node" cx="270" cy="220" r="20" />
  <text class="node-text" x="270" y="225" text-anchor="middle">E</text>
</svg>