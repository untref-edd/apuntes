<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      .edge { stroke: #e0e0e0; stroke-width: 2; }
      .weight-text { fill: #e0e0e0; font-weight: bold; font-family: Arial; font-size: 14px; }
      .node-text { fill: #e0e0e0; font-family: Arial; font-size: 14px; }
      .variable-node { fill: #2d3748; stroke: #63b3ed; stroke-width: 2; }
      .value-node { fill: #4a5568; stroke: #fc8181; stroke-width: 2; }
      .highlight-edge { stroke: #ef6c00; stroke-width: 2; }
      .highlight-text { fill: #ef6c00; font-weight: bold; font-family: Arial; font-size: 14px; }
      .background { fill: #1e1e1e; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="background" />
  <line class="edge" x1="100" y1="50" x2="300" y2="100" />
  <line class="edge" x1="100" y1="50" x2="300" y2="200" />
  <line class="edge" x1="100" y1="150" x2="300" y2="100" />
  <line class="edge" x1="100" y1="250" x2="300" y2="200" />
  <line class="edge" x1="100" y1="250" x2="300" y2="100" />
  <line class="edge" x1="100" y1="150" x2="300" y2="200" />
  <circle class="variable-node" cx="100" cy="50" r="20" />
  <text class="node-text" x="100" y="55" text-anchor="middle">U1</text>
  <circle class="variable-node" cx="100" cy="150" r="20" />
  <text class="node-text" x="100" y="155" text-anchor="middle">U2</text>
  <circle class="variable-node" cx="100" cy="250" r="20" />
  <text class="node-text" x="100" y="255" text-anchor="middle">U3</text>
  <circle class="value-node" cx="300" cy="100" r="20" />
  <text class="node-text" x="300" y="105" text-anchor="middle">V1</text>
  <circle class="value-node" cx="300" cy="200" r="20" />
  <text class="node-text" x="300" y="205" text-anchor="middle">V2</text>
</svg>